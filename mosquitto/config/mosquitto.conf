# ─────────────────────────────────────────────────────────────
#  Eclipse Mosquitto — configuración para laboratorio
#  Proyecto: Monitor de compartimentos con reed switches / ESP32
#  ESCOM-IPN  |  Internet de las Cosas / Embedded Systems
# ─────────────────────────────────────────────────────────────

# ── Listener MQTT estándar ────────────────────────────────────
listener 1883
protocol mqtt

# ── Listener WebSocket (usado por el dashboard vía navegador) ─
listener 9001
protocol websockets

# ── Autenticación ─────────────────────────────────────────────
# En laboratorio se permite conexión anónima para simplificar la
# demostración. En producción, deshabilitar y agregar usuarios.
allow_anonymous true

# ── Persistencia ──────────────────────────────────────────────
# Conserva mensajes retenidos y sesiones entre reinicios del
# contenedor; importante para publisher/status y sensor/summary.
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Keep-alive y límites ──────────────────────────────────────
max_keepalive 120
